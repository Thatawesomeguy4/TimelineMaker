services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: timeline-web
    working_dir: /workspace/apps/web
    volumes:
      - ./:/workspace
      - web_node_modules:/workspace/apps/web/node_modules
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: http://localhost:3000
      VITE_COLLAB_WS_URL: ws://localhost:1234
      CHOKIDAR_USEPOLLING: "true"
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - api

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    container_name: timeline-api
    working_dir: /workspace/apps/api
    volumes:
      - ./:/workspace
      - api_node_modules:/workspace/apps/api/node_modules
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://timeline:timeline_dev_password@postgres:5432/timeline_app?schema=public
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: dev_change_this_session_secret
    command: npm run dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16
    container_name: timeline-postgres
    environment:
      POSTGRES_USER: timeline
      POSTGRES_PASSWORD: timeline_dev_password
      POSTGRES_DB: timeline_app
    ports:
      - "5432:5432"
    volumes:
      - timeline_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timeline -d timeline_app"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: timeline-redis
    ports:
      - "6379:6379"

  yjs:
    image: node:24-bookworm
    container_name: timeline-yjs
    working_dir: /workspace/apps/web
    volumes:
      - ./:/workspace
      - web_node_modules:/workspace/apps/web/node_modules
    ports:
      - "1234:1234"
    command: sh -c "npm install @y/y-websocket-server && HOST=0.0.0.0 PORT=1234 npx y-websocket"
    depends_on:
      - web

volumes:
  web_node_modules:
  api_node_modules:
  timeline_postgres_data: